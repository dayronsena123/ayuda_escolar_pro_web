services:
  # Web Service for Express Server Backend
  - type: web
    name: ayuda-escolar-pro-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/server.js
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production

  # Static site for Frontend
  - type: static
    name: ayuda-escolar-pro-frontend
    env: static
    plan: free
    publishPath: frontend
